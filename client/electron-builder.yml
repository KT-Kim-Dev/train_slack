appId: com.intrachat.app
productName: Intra-Chat

# electron-vite 빌드 산출물(out/)만 패키징
directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# Windows 빌드 — portable exe (설치 불필요, 공유폴더에서 바로 실행)
win:
  target:
    - target: portable
      arch:
        - x64
  # build/icon.ico 가 있으면 자동 사용 (없으면 기본 Electron 아이콘)
  icon: build/icon.ico

portable:
  artifactName: Intra-Chat-${version}-portable.exe

# 인트라넷/오프라인 환경 — 자동 업데이트/코드사인 생략
publish: null
asar: true
compression: maximum
